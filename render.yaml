# Render Blueprint - Backend + PostgreSQL
# https://render.com/docs/blueprint-spec

databases:
  - name: hrms-lite-db
    plan: free
    databaseName: hrms_lite
    user: hrms_user

services:
  - type: web
    name: hrms-lite-api
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: hrms-lite-db
          property: connectionString
      - key: CORS_ORIGINS
        value: https://hrms-lite-psi-navy.vercel.app
      - key: PYTHON_VERSION
        value: "3.11.0"
    healthCheckPath: /health
